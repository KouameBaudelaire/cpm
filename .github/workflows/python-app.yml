# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  no_env: 
    runs-on: ubuntu-latest
    steps:
    - name: Valeur environnement
      run: |
        echo ${{vars.VERSION}}
  dev_env:
    runs-on: ubuntu-latest
    needs: no_env
    environment: dev
    steps:
    - name: Valeur environnement
      run: |
        echo ${{vars.VERSION}}
  prod_env:
    runs-on: ubuntu-latest
    needs: dev_env
    environment: prod
    steps:
    - name: Valeur environnement
      run: |
        echo ${{vars.VERSION}}    
  prod_env_2:
    runs-on: ubuntu-latest
    environment: prod
    steps:
    - name: Valeur environnement
      run: |
        echo ${{vars.CONFIG_VARIABLE}}
