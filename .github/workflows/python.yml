name: Python CI

on: 
  push: 
    branches: ["main"]
  pull_request:
    branches: ["main"]
    

jobs: 
  build: 
    runs-on: ubuntu-latest

    steps:
      - name: Cloner le repo
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python_version: "3.11"

      - name: Installer les dependances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configurer variables secretes
        run: |
            echo "${{vars.CONF_VARIABLE}}"
            echo "${{secrets.DEMO}}"

      - name: Install dotenv
        run: |
         pip install python-dotenv
         
      - name: lancer le test
        run: |
         python -m src.main 
         pytest
