name: Create Repo and Story

on:
  workflow_dispatch:
    inputs:
      username:
        description: "Username"
        required: true
        type: string
      version:
        description: "Version"
        required: true
        type: string
      image:
        description: "Image Docker"
        required: true
        type: string
      repo_name:
        description: "Nom du repository"
        required: true
        type: string

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:

      - name: Créer le repository
        run: |
          STATUS=$(curl -s -o /tmp/create_repo.txt -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.TOKEN_GITHUB }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/user/repos \
            -d '{"name":"${{ github.event.inputs.repo_name }}","private":false,"auto_init":false}')

            sleep 3 

      - name: Créer le README.md
        run: |
          README="# ${{ github.event.inputs.repo_name }}\n\n| Champ | Valeur |\n|-------|--------|\n| Username | ${{ github.event.inputs.username }} |\n| Version | ${{ github.event.inputs.version }} |\n| Image | ${{ github.event.inputs.image }} |"
      
          ENCODED=$(printf "%s" "$README" | base64 -w 0)
      
          curl -s \
            -X PUT \
            -H "Authorization: Bearer ${{ secrets.TOKEN_GITHUB }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ secrets.TOKEN_GITHUB }}/${{ github.event.inputs.repo_name }}/contents/README.md \
            -d "{\"message\":\"Initial commit\",\"content\":\"$ENCODED\"}"

      - name: Créer la variable VERSION
        run: |
          curl -s -o /dev/null \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.TOKEN_GITHUB }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.event.inputs.username }}/${{ github.event.inputs.repo_name }}/actions/variables \
            -d '{"name":"VERSION","value":"${{ github.event.inputs.username }}"}'

      - name: Récupérer la clé publique du repository
        run: |
          curl -s \
            -H "Authorization: Bearer ${{ secrets.TOKEN_GITHUB }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.event.inputs.username }}/${{ github.event.inputs.repo_name }}/actions/secrets/public-key \
            -o /tmp/pubkey.txt

      - name: Créer le secret avec l'image Docker
        run: |
          SECRET_NAME="${{ github.event.inputs.version }}"

          curl -s -o /dev/null \
            -X PUT \
            -H "Authorization: Bearer ${{ secrets.TOKEN_GITHUB }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.event.inputs.username }}/${{ github.event.inputs.repo_name }}/actions/secrets/$SECRET_NAME \
            -d '{"encrypted_value":"${{ github.event.inputs.image }}","key_id":"placeholder"}'


