# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  no_env: 
    runs-on: ubuntu-latest
    steps:
    - name: Valeur environnement
      run: |
        echo "${{vars.VERSION}}" > version.txt
        
    - name: sauvegarder la valeur de version
      uses: actions/upload-artifact@v4
      with:
        name: version no-env
        path: version.txt
       
  dev_env:
    runs-on: ubuntu-latest
    needs: [ no_env ]
    environment: dev
    if: always()
    steps:
    - name: Valeur environnement
      run: |
        echo ${{vars.VERSION}}
  prod_env:
    runs-on: ubuntu-latest
    needs: [ no_env ]
    environment: prod
    steps:
    - name: Valeur environnement
      run: |
        echo ${{vars.VERSION}}
  prod_env_2:
    runs-on: ubuntu-latest
    needs: [ dev_env, prod_env ]
    environment: prod
    steps:
    - name: Valeur environnement
      run: |
        echo ${{vars.CONFIG_VARIABLE}}
    - name: Créer fichier
      run: echo "Hello Artifact"

    - name: Artifact downloader no_env
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: version no-env
        path: .
    - name: afficher la valeur recup
      run: cat version.txt
