name: "Docker Build"

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Quel service builder ?"
        required: true
        type: choice
        options:
          - api
          - worker
          - frontend
      tag:
        - 'v1'
        description: "Tag de l'image (ex: 1.0.0)"
        required: false
        default: "latest"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}  
          password: ${{ secrets.DOCKERHUB_TOKEN }}  

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./services/${{ inputs.service }}
          file: ./services/${{ inputs.service }}/Dockerfile
          push: true
          tags: |
            donassongui/${{ inputs.service }}:${{ inputs.tag }}
            donassongui/${{ inputs.service }}:latest
      - id: normalise_image_name
        run: |
          cleaned=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          COMMIT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          echo "image_name=ghcr.io/$cleaned/odoo:$COMMIT_SHA" >> "$GITHUB_OUTPUT"
