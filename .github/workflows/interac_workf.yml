name: interactif workflow


on:
  workflow_dispatch:
    
    inputs:
      name:
        description: 'nom utilisateur'
        required: true
        type: string

      version:
        description: "Version du projet (ex: 1.0.0)"
        required: true
        type: string
        default: "1.0.0"

      image_docker:
        description: "Nom de l'image Docker"
        required: true
        type: string

permissions:
  contents: write
  
jobs:
  creer_repo:
    runs-on: ubuntu-latest
    steps:

      - name: creer le repository
        run:  |
        
            curl -X POST \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              /orgs/ORG/repos
              -d '{
                "name": "'"${{ github.event.inputs.nom_repo }}"'",
                "description": "Repository créé automatiquement par GitHub Actions",
                "private": false,
                "auto_init": true
              }'
              

  creer_variable:                      
    runs-on: ubuntu-latest
    needs: creer_repo  
  
    steps: 
      - name: recuperer la clé publique du repo
        run: |
            curl -X POST \
              -H "Authorization: Bearer ${{ secrets.TOKEN_GITHUB }}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.actor }}/${{ inputs.nom_repo }}/actions/variables \
              -d '{
                "name": "VERSION",
                "value": "${{ inputs.version }}"
              }'
  creer_secret:
    runs-on: ubuntu-latest
    needs: creer_variable

    steps:
      - name: recup la cle public du repo
        id: cle_public
        run: |
          response=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.TOKEN_GITHUB }}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.actor }}/${{ inputs.nom_repo }}/actions/secrets/public-key)
  
            echo "key_id=$(echo $response | jq -r '.key_id')" >> "$GITHUB_OUTPUT"
            echo "key=$(echo $response | jq -r '.key')" >> "$GITHUB_OUTPUT"
  
      - name: creer le secret IMAGE_DOCKER
        run: |
          encrypted=$(echo -n "${{ inputs.image_docker }}" | \
              openssl rsautl -encrypt -pubin \
              -inkey <(echo "${{ steps.cle_publique.outputs.key }}" | base64 -d) | \
              base64 -w 0)
  
              curl -X PUT \
              -H "Authorization: Bearer ${{ secrets.TOKEN_GITHUB }}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.actor }}/${{ inputs.nom_repo }}/actions/secrets/IMAGE_DOCKER \
              -d "{
                \"encrypted_value\": \"$encrypted\",
                \"key_id\": \"${{ steps.cle_publique.outputs.key_id }}\"
              }"
  creer_readme:
    runs-on: ubuntu-latest
    needs: creer_secret
    steps:
     - name: creer le README.md
       run: |
         contenu=$(echo "# ${{ inputs.nom_repo }}
            Repository créé automatiquement via GitHub Actions.
            " | base64 -w 0)

          curl -X PUT \
            -H "Authorization: Bearer ${{ secrets.TOKEN_GITHUB }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.actor }}/${{ inputs.nom_repo }}/contents/README.md \
            -d "{
              \"message\": \"Ajout du README.md\",
              \"content\": \"$contenu\"
            }"
            
  resume:                          
    runs-on: ubuntu-latest
    needs: creer_readme              

    steps:
      
      - name: Afficher le resume
        run: |
            echo "======================================="
            echo " Repository créé avec succès !"
            echo " Nom        : ${{ inputs.nom_repo }}"
            echo "  Version    : ${{ inputs.version }}"
            echo " Image      : ${{ inputs.image_docker }}"
            echo " URL        : https://github.com/${{ github.actor }}/${{ inputs.nom_repo }}"
            echo "======================================="
